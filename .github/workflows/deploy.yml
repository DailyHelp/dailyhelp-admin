name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dailyhelp-admin-production
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  APP_NAME: dailyhelp-admin
  RELEASE_ARCHIVE: dailyhelp-admin-release.tar.gz
  NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
  NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
  NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate required environment secrets
        run: |
          : "${NEXT_PUBLIC_API_BASE_URL:?Missing NEXT_PUBLIC_API_BASE_URL secret}"
          : "${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:?Missing NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME secret}"
          : "${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET:?Missing NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET secret}"

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - run: npm run build

      - name: Package release artifact
        run: |
          tar --owner=0 --group=0 --mode='go-w' -czf "${RELEASE_ARCHIVE}" \
            .next public package.json package-lock.json \
            next.config.mjs ecosystem.config.js

      - uses: actions/upload-artifact@v4
        with:
          name: dailyhelp-admin-release
          path: ${{ env.RELEASE_ARCHIVE }}
          if-no-files-found: error

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dailyhelp-admin-release
          path: .

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT_RAW: ${{ secrets.DEV_SSH_PORT }}
        run: |
          : "${SSH_KEY:?SSH_KEY secret is not set}"
          : "${SSH_HOST:?SSH_HOST secret is not set}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT_RAW:-22}"
          echo "SSH_PORT=$PORT" >> $GITHUB_ENV
          echo "SSH_HOST=$SSH_HOST" >> $GITHUB_ENV
          ssh-keyscan -t ed25519 -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via wrapper
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          RELEASE="release-$(date +%s)-${{ github.run_number }}-${{ github.sha }}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "deploy $APP_NAME $RELEASE" < "${RELEASE_ARCHIVE}"

      - name: Tear down SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
